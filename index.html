<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="6-Min Tagebuch">
  <meta name="theme-color" content="#1A1A2E">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co https://script.google.com https://script.googleusercontent.com https://esm.sh https://cdn.jsdelivr.net; img-src 'self' data: https://*.googleusercontent.com; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <title>6-Minuten-Tagebuch</title>
  <style>
    :root {
      --bg: #FAFAFA;
      --bg-alt: #F3F4F6;
      --text: #1A1D26;
      --text-secondary: #6B7280;
      --card: #FFFFFF;
      --border: #E5E7EB;
      --accent: #1A1A2E;
      --accent-light: #E8B86D;
      --success: #16a34a;
      --error: #DC2626;
      --error-bg: #FEF2F2;
      --error-border: #FECACA;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0F0F1A;
        --bg-alt: #1A1A2E;
        --text: #F0F0F5;
        --text-secondary: #9CA3AF;
        --card: #1E1E35;
        --border: #2A2A45;
        --accent: #E8B86D;
        --accent-light: #E8B86D;
        --success: #22c55e;
        --error: #F87171;
        --error-bg: #3B1A1A;
        --error-border: #5C2626;
        --shadow: rgba(0, 0, 0, 0.3);
      }
    }

    [data-theme="dark"] {
      --bg: #0F0F1A;
      --bg-alt: #1A1A2E;
      --text: #F0F0F5;
      --text-secondary: #9CA3AF;
      --card: #1E1E35;
      --border: #2A2A45;
      --accent: #E8B86D;
      --accent-light: #E8B86D;
      --success: #22c55e;
      --error: #F87171;
      --error-bg: #3B1A1A;
      --error-border: #5C2626;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Main Container */
    .screen-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
    }

    .screen-content {
      flex: 1;
      padding: 0;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }

    /* Bottom Tab Bar */
    .tab-bar {
      display: flex;
      gap: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      padding-top: 8px;
      position: relative;
      z-index: 100;
    }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 0;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 20px;
      color: var(--text-secondary);
      text-decoration: none;
    }

    .tab.active {
      color: var(--accent);
    }

    .tab-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: -0.3px;
    }

    /* Screens */
    .screen {
      display: none;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    /* Auth / Login Screen */
    .auth-screen {
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      text-align: center;
      min-height: 100vh;
    }

    .auth-logo {
      font-size: 64px;
      margin-bottom: 8px;
    }

    .auth-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .auth-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-secondary);
      font-size: 13px;
      margin: 4px 0;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      gap: 8px;
      font-weight: 500;
    }

    .btn-google:active {
      background: #F5F5F5;
    }

    .btn-google svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .auth-toggle {
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .auth-toggle span {
      color: var(--accent);
      font-weight: 600;
      text-decoration: underline;
    }

    .auth-demo-link {
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      margin-top: 8px;
    }

    .auth-demo-link:hover {
      color: var(--text);
    }

    .auth-error {
      background: #FEF2F2;
      color: #DC2626;
      font-size: 14px;
      padding: 10px 16px;
      border-radius: 8px;
      text-align: left;
    }

    .auth-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 18px;
      color: var(--text-secondary);
    }

    /* Legacy Setup Screen (kept for Supabase config) */
    .setup-screen {
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 32px;
      text-align: center;
    }

    .setup-logo {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .setup-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .setup-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .setup-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 300px;
    }

    /* Buttons */
    .btn {
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: var(--accent);
      color: #FFFFFF;
    }

    .btn-primary:active {
      background: #0D0D15;
      transform: scale(0.98);
    }

    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 2px solid #1A1A2E;
    }

    .btn-secondary:active {
      background: #F5F5F5;
    }

    .btn-small {
      padding: 12px 16px;
      font-size: 14px;
      min-height: 40px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    /* Inputs */
    .input-field {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: var(--card);
      transition: border-color 0.2s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: #E8B86D;
      box-shadow: 0 0 0 3px rgba(232, 184, 109, 0.1);
    }

    textarea.input-field {
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
      -webkit-user-select: text;
      user-select: text;
    }

    /* Onboarding */
    .onboarding-screen {
      padding: 60px 20px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      gap: 32px;
    }

    .onboarding-icon {
      font-size: 80px;
    }

    .onboarding-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    .onboarding-text {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .onboarding-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 24px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #E5E7EB;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: #E8B86D;
      width: 24px;
      border-radius: 4px;
    }

    /* Dashboard */
    .dashboard-screen {
      padding: 20px;
      padding-top: max(24px, env(safe-area-inset-top, 24px));
      padding-bottom: 100px;
      display: flex !important;
      flex-direction: column;
      gap: 16px;
    }

    .dashboard-greeting {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      padding: 0 4px;
    }

    .dashboard-date {
      font-size: 13px;
      color: var(--text-secondary);
      padding: 0 4px;
      margin-top: -8px;
    }

    .quote-card {
      background: linear-gradient(135deg, #FFF8EE 0%, #FFECD2 50%, #FCE4C3 100%);
      color: #5C3D0A;
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      font-size: 17px;
      font-weight: 500;
      font-style: italic;
      line-height: 1.7;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(232, 184, 109, 0.15);
      border: 1px solid rgba(232, 184, 109, 0.2);
      position: relative;
      overflow: hidden;
    }

    .quote-card::before {
      content: '✦';
      position: absolute;
      top: 12px;
      left: 16px;
      font-size: 14px;
      font-style: normal;
      opacity: 0.3;
      color: #D4A04A;
    }

    .quote-card::after {
      content: '✦';
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 14px;
      font-style: normal;
      opacity: 0.3;
      color: #D4A04A;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .quote-card {
        background: linear-gradient(135deg, #2A2215 0%, #3D3020 50%, #4A3A28 100%);
        color: #F5E6CC;
        border-color: rgba(232, 184, 109, 0.15);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      :root:not([data-theme="light"]) .quote-card::before,
      :root:not([data-theme="light"]) .quote-card::after {
        color: #E8B86D;
      }
    }

    [data-theme="dark"] .quote-card {
      background: linear-gradient(135deg, #2A2215 0%, #3D3020 50%, #4A3A28 100%);
      color: #F5E6CC;
      border-color: rgba(232, 184, 109, 0.15);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    [data-theme="dark"] .quote-card::before,
    [data-theme="dark"] .quote-card::after {
      color: #E8B86D;
    }

    /* Weekly Challenge Widget */
    .challenge-widget {
      background: linear-gradient(135deg, #F0FFF4 0%, #E6FFED 50%, #DCFCE7 100%);
      border-radius: 16px;
      padding: 18px 20px;
      border: 1px solid rgba(34, 197, 94, 0.15);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .challenge-widget:active { transform: scale(0.98); }
    .challenge-widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .challenge-widget-kw {
      font-size: 11px;
      font-weight: 600;
      color: #16a34a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .challenge-widget-icon {
      font-size: 24px;
    }
    .challenge-widget-title {
      font-size: 16px;
      font-weight: 700;
      color: #14532D;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .challenge-widget-desc {
      font-size: 13px;
      color: #166534;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .challenge-widget-done {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      font-size: 12px;
      color: #16a34a;
      font-weight: 600;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .challenge-widget {
        background: linear-gradient(135deg, #0D2818 0%, #14532D 50%, #1A4A2E 100%);
        border-color: rgba(34, 197, 94, 0.2);
      }
      :root:not([data-theme="light"]) .challenge-widget-title { color: #BBF7D0; }
      :root:not([data-theme="light"]) .challenge-widget-desc { color: #86EFAC; }
      :root:not([data-theme="light"]) .challenge-widget-kw { color: #4ADE80; }
    }
    [data-theme="dark"] .challenge-widget {
      background: linear-gradient(135deg, #0D2818 0%, #14532D 50%, #1A4A2E 100%);
      border-color: rgba(34, 197, 94, 0.2);
    }
    [data-theme="dark"] .challenge-widget-title { color: #BBF7D0; }
    [data-theme="dark"] .challenge-widget-desc { color: #86EFAC; }
    [data-theme="dark"] .challenge-widget-kw { color: #4ADE80; }

    /* Challenge Detail Overlay */
    .challenge-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .challenge-detail {
      background: var(--bg);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .challenge-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .challenge-detail-icon { font-size: 40px; }
    .challenge-detail-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg-alt);
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
    }
    .challenge-detail-kw {
      font-size: 12px;
      font-weight: 600;
      color: #16a34a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .challenge-detail-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .challenge-detail-desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .challenge-rating {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .challenge-star {
      font-size: 32px;
      cursor: pointer;
      transition: transform 0.15s ease;
      filter: grayscale(1);
      opacity: 0.4;
    }
    .challenge-star.active {
      filter: none;
      opacity: 1;
    }
    .challenge-star:active { transform: scale(1.2); }
    .challenge-note {
      width: 100%;
      min-height: 80px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      background: var(--bg-alt);
      color: var(--text);
      resize: vertical;
      font-family: inherit;
    }
    .challenge-save-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s;
    }
    .challenge-save-btn:active { opacity: 0.8; }

    .streak-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      padding: 16px 20px;
      border-radius: 16px;
      box-shadow: 0 2px 10px var(--shadow);
      border: 1px solid var(--border);
    }

    .streak-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .streak-number {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .streak-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .streak-freeze {
      font-size: 12px;
      background: #FEF3C7;
      color: #92400E;
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 600;
    }

    .status-dots {
      display: flex;
      gap: 12px;
    }

    .status-dot {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #F3F4F6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-direction: column;
    }

    .status-dot.done {
      background: #16a34a;
      color: #FFFFFF;
    }

    .status-dot.pending {
      background: #FEF3C7;
      color: #92400E;
    }

    .status-time {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: -0.3px;
    }

    .main-action-btn {
      padding: 20px;
      font-size: 18px;
      font-weight: 700;
      min-height: 60px;
      margin: 20px 0;
      box-shadow: 0 4px 12px rgba(26, 26, 46, 0.2);
    }

    .main-action-btn:active {
      box-shadow: 0 2px 6px rgba(26, 26, 46, 0.1);
    }

    .habits-widget {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .habits-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    .habits-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .habit-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #F3F4F6;
    }

    .habit-item:last-child {
      border-bottom: none;
    }

    .habit-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #E5E7EB;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .habit-checkbox.checked {
      background: #16a34a;
      border-color: #16a34a;
      color: #FFFFFF;
      font-size: 14px;
    }

    .habit-name {
      font-size: 14px;
      color: var(--text);
      flex: 1;
    }

    /* Journal Entry */
    .journal-screen {
      padding: 20px;
      padding-bottom: 100px;
      display: flex !important;
      flex-direction: column;
      gap: 0;
    }

    .journal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-top: 4px;
    }

    .journal-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .journal-close {
      font-size: 20px;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .journal-progress {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .progress-bar {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      transition: background 0.3s ease;
    }

    .progress-bar.active {
      background: linear-gradient(90deg, #E8B86D, #D4A04A);
    }

    .question-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .question-label {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      padding: 16px 20px;

    async function importWithTimeout(url, ms = 10000) {
      return Promise.race([
        import(url),
        new Promise((_, rej) => setTimeout(() => rej(new Error(`CDN timeout: ${url}`)), ms))
      ]);
    }

    async function importWithFallback(urls, ms = 10000) {
      for (const url of urls) {
        try { return await importWithTimeout(url, ms); } catch (e) { console.warn('[CDN]', e.message); }
      }
      throw new Error('Alle CDN-Quellen fehlgeschlagen');
    }

    function getISOWeekNumber(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function getCurrentWeekChallenge() {
      const now = new Date();
      const weekNum = getISOWeekNumber(now);
      // Wrap around: week 53+ maps to week 1
      const idx = ((weekNum - 1) % 52);
      return { ...WEEKLY_CHALLENGES[idx], weekNum };
    }

    // iOS ITP Schutz: IndexedDB als Backup für localStorage (Safari löscht nach 7 Tagen)
    const IDB_NAME = '6min_backup';
    const IDB_STORE = 'data';

    function openIDB() {
      return new Promise((resolve, reject) => {
        try {
          const req = indexedDB.open(IDB_NAME, 1);
          req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        } catch (e) { reject(e); }
      });
    }

    async function idbGet(key) {
      try {
        const db = await openIDB();
        return new Promise((resolve) => {
          const tx = db.transaction(IDB_STORE, 'readonly');
          const req = tx.objectStore(IDB_STORE).get(key);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => resolve(null);
        });
      } catch { return null; }
    }

    async function idbSet(key, val) {
      try {
        const db = await openIDB();
        const tx = db.transaction(IDB_STORE, 'readwrite');
        tx.objectStore(IDB_STORE).put(val, key);
      } catch { /* silent */ }
    }

    function loadDemoData() {

        if (stored) {

          return { ...DEMO_DEFAULTS, ...parsed };
        }
      } catch (e) {
        console.warn('[Demo] localStorage read failed:', e.message);
      }
      return { ...DEMO_DEFAULTS };
    }

    // Async: IndexedDB-Recovery bei leerem localStorage (iOS ITP)
    async function recoverDemoDataFromIDB() {
      const lsData = localStorage.getItem(DEMO_STORAGE_KEY);
      if (!lsData || lsData === '{}') {
        const idbData = await idbGet(DEMO_STORAGE_KEY);
        if (idbData && Object.keys(idbData.entries || {}).length > 0) {
          console.log('[ITP] Recovering data from IndexedDB backup');
          Object.assign(DEMO_DATA, { ...DEMO_DEFAULTS, ...idbData });
          saveDemoData(); // Zurück in localStorage schreiben
          return true;
        }
      }
      return false;
    }

    function saveDemoData() {
      try {
        localStorage.setItem(DEMO_STORAGE_KEY, JSON.stringify(DEMO_DATA));
        // Dual-Write: auch in IndexedDB als Backup (async, non-blocking)
        idbSet(DEMO_STORAGE_KEY, JSON.parse(JSON.stringify(DEMO_DATA)));
      } catch (e) {
        console.warn('[Demo] localStorage write failed:', e.message);
        // Fallback: nur IndexedDB
        idbSet(DEMO_STORAGE_KEY, JSON.parse(JSON.stringify(DEMO_DATA)));
      }
    }

    function compressImage(file, maxWidth = 800, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    class DataService {
      constructor(isDemo = true) {
        this.isDemo = isDemo;
        this.supabaseClient = null;
        this.userId = null;
        this.user = null;
      }

      // ---- Auth Methods ----

      static async createWithSupabase(url, key) {
        const ds = new DataService(false);
        try {
          // Import mit 8s Timeout — bei CDN-Ausfall Fallback auf Demo-Mode
          const importPromise = import('https://esm.sh/@supabase/supabase-js@2.45.0');
          const timeoutPromise = new Promise((_, reject) =>
            setTimeout(() => reject(new Error('CDN timeout nach 8s')), 8000)
          );
          const { createClient } = await Promise.race([importPromise, timeoutPromise]);
          ds.supabaseClient = createClient(url, key, {
            auth: {
              autoRefreshToken: true,
              persistSession: true,
              detectSessionInUrl: true
            }
          });
          return ds;
        } catch (e) {
          console.error('Supabase init failed:', e);
          console.warn('[Fallback] Wechsel zu Demo-Modus');
          return null;
        }
      }

      onAuthStateChange(callback) {
        if (!this.supabaseClient) return () => {};
        const { data: { subscription } } = this.supabaseClient.auth.onAuthStateChange((event, session) => {
          if (session?.user) {
            this.user = session.user;
            this.userId = session.user.id;
          } else {
            this.user = null;
            this.userId = null;
          }
          callback(event, session);
        });
        return () => subscription?.unsubscribe();
      }

      async getSession() {
        if (!this.supabaseClient) return null;
        const { data: { session } } = await this.supabaseClient.auth.getSession();
        if (session?.user) {
          this.user = session.user;
          this.userId = session.user.id;
        }
        return session;
      }

      async signInWithGoogle() {
        if (!this.supabaseClient) return { error: 'Kein Supabase' };
        const { data, error } = await this.supabaseClient.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + window.location.pathname }
        });
        return { data, error };
      }

      async signInWithEmail(email, password) {
        if (!this.supabaseClient) return { error: 'Kein Supabase' };
        const { data, error } = await this.supabaseClient.auth.signInWithPassword({ email, password });
        if (data?.user) {
          this.user = data.user;
          this.userId = data.user.id;
        }
        return { data, error };
      }

      async signUpWithEmail(email, password) {
        if (!this.supabaseClient) return { error: 'Kein Supabase' };
        const { data, error } = await this.supabaseClient.auth.signUp({
          email,
          password,
          options: { emailRedirectTo: window.location.origin + window.location.pathname }
        });
        return { data, error };
      }

      async signOut() {
        if (this.supabaseClient) {
          await this.supabaseClient.auth.signOut();
        }
        this.user = null;
        this.userId = null;
      }

      // ---- DSGVO Art. 17: Recht auf Löschung ----

      async deleteAllUserData() {
        if (this.isDemo) {
          // Demo-Modus: localStorage komplett löschen
          try {
            localStorage.removeItem(DEMO_STORAGE_KEY);
            localStorage.removeItem('6min_onboarding_done');
            localStorage.removeItem('6min_theme');
            // DEMO_DATA zurücksetzen
            Object.keys(DEMO_DATA).forEach(k => delete DEMO_DATA[k]);
            Object.assign(DEMO_DATA, JSON.parse(JSON.stringify(DEMO_DEFAULTS)));
          } catch (e) {
            console.warn('[DSGVO] Demo-Daten Löschung fehlgeschlagen');
          }
          return { success: true };
        }

        if (!this.supabaseClient || !this.userId) {
          return { success: false, error: 'Nicht angemeldet' };
        }

        try {
          // 1. Alle Habit-Logs löschen
          const r1 = await this._withRetry(async () =>
            await this.supabaseClient.from('habit_logs').delete().eq('user_id', this.userId));
          if (r1.error) throw r1.error;

          // 2. Alle Habits löschen
          const r2 = await this._withRetry(async () =>
            await this.supabaseClient.from('habits').delete().eq('user_id', this.userId));
          if (r2.error) throw r2.error;

          // 3. Alle Tagebuch-Einträge löschen
          const r3 = await this._withRetry(async () =>
            await this.supabaseClient.from('daily_entries').delete().eq('user_id', this.userId));
          if (r3.error) throw r3.error;

          // 4. Alle Wochenreflexionen löschen (falls Tabelle existiert)
          try {
            await this._withRetry(async () =>
              await this.supabaseClient.from('weekly_reflections').delete().eq('user_id', this.userId));
          } catch (_) { /* Tabelle existiert möglicherweise nicht */ }

          // 5. localStorage bereinigen
          try {
            localStorage.removeItem('6min_onboarding_done');
            localStorage.removeItem('6min_theme');
            localStorage.removeItem(DEMO_STORAGE_KEY);
          } catch (_) {}

          // 6. Session beenden
          await this.signOut();

          return { success: true };
        } catch (e) {
          console.error('[DSGVO] Löschung fehlgeschlagen');
          return { success: false, error: e.message || 'Löschung fehlgeschlagen' };
        }
      }

      // ---- Legacy Supabase init (for backwards compat) ----
      async initSupabase(url, key) {
        try {
          const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2.45.0');
          this.supabaseClient = createClient(url, key);
          this.isDemo = false;
          return true;
        } catch (e) {
          console.error('Supabase init failed:', e);
          return false;
        }
      }

      // ---- Token Refresh Helper ----
      async _withRetry(fn) {
        try {
          const result = await fn();
          const errMsg = result.error?.message || '';
          // Robustere Auth-Fehler-Erkennung (nicht nur String-Match)
          const isAuthError = result.error?.status === 401 || result.error?.status === 403
            || errMsg.includes('JWT') || errMsg.includes('token') || errMsg.includes('session')
            || errMsg.includes('invalid_grant') || errMsg.includes('access_token');
          if (isAuthError) {
            const { error: refreshError } = await this.supabaseClient.auth.refreshSession();
            if (refreshError) {
              console.warn('[Auth] Session-Refresh fehlgeschlagen');
              return result; // Original-Fehler zurückgeben
            }
            return await fn();
          }
          return result;
        } catch (e) {
          console.error('[DB] Operation fehlgeschlagen');
          return { data: null, error: e };
        }
      }

      async getEntries(date = null) {
        const targetDate = date ? new Date(date).toISOString().split('T')[0] : this.getTodayDate();

        if (this.isDemo) {
          return DEMO_DATA.entries[targetDate] || { morning: null, evening: null };
        }

        if (!this.supabaseClient) return { morning: null, evening: null };

        try {
          const result = await this._withRetry(async () => await this.supabaseClient
            .from('daily_entries')
            .select('morning, evening')
            .eq('user_id', this.userId)
            .eq('entry_date', targetDate)
            .maybeSingle());

          return result.data || { morning: null, evening: null };
        } catch (e) {
          console.error('getEntries error:', e);
          return { morning: null, evening: null };
        }
      }

      // Validiere Journal-Content Struktur und Länge
      _validateContent(content) {
        if (!content || typeof content !== 'object') return false;
        const MAX_LEN = 2500;
        const arrayFields = ['grateful', 'wonderful', 'great_things'];
        const stringFields = ['affirmation', 'learned', 'improve'];
        for (const f of arrayFields) {
          if (content[f] && Array.isArray(content[f])) {
            for (const item of content[f]) {
              // Leere/undefined Einträge sind OK (User hat Feld übersprungen)
              if (item == null || item === '') continue;
              if (typeof item !== 'string' || item.length > MAX_LEN) return false;
            }
          }
        }
        for (const f of stringFields) {
          if (content[f] && content[f] !== '' && (typeof content[f] !== 'string' || content[f].length > MAX_LEN)) return false;
        }
        return true;
      }

      async saveEntry(date, type, content) {
        const targetDate = date || this.getTodayDate();

        // Bereinige sparse Arrays: undefined → ''
        if (content && typeof content === 'object') {
          for (const key of Object.keys(content)) {
            if (Array.isArray(content[key])) {
              content[key] = content[key].map(v => (v == null ? '' : v));
            }
          }
        }

        // Validierung vor Speicherung
        if (content && typeof content === 'object' && !this._validateContent(content)) {
          console.warn('[Save] Content validation failed', JSON.stringify(content));
          return false;
        }

        if (this.isDemo) {
          if (!DEMO_DATA.entries[targetDate]) {
            DEMO_DATA.entries[targetDate] = { morning: null, evening: null };
          }
          DEMO_DATA.entries[targetDate][type] = content;
          saveDemoData();
          return true;
        }

        if (!this.supabaseClient) return false;

        try {
          const existing = await this.getEntries(targetDate);
          const payload = { ...existing, [type]: content, entry_date: targetDate, user_id: this.userId };

          const result = await this._withRetry(async () => await this.supabaseClient
            .from('daily_entries')
            .upsert(payload, { onConflict: ['user_id', 'entry_date'] }));

          return !result.error;
        } catch (e) {
          console.error('saveEntry error:', e);
          return false;
        }
      }

      async getStreak() {
        const dates = this.isDemo
          ? Object.keys(DEMO_DATA.entries).filter(d => DEMO_DATA.entries[d].morning || DEMO_DATA.entries[d].evening)
          : await this.getAllEntryDates();

        if (dates.length === 0) return { streak: 0, freeze: false };

        dates.sort().reverse();
        let streak = 0;
        let freezeUsed = false;

        const today = this.getTodayDate();
        let currentDate = new Date(today);

        for (const dateStr of dates) {
          const entryDate = new Date(dateStr);
          const daysDiff = Math.floor((currentDate - entryDate) / (1000 * 60 * 60 * 24));

          if (daysDiff <= streak + 1) {
            streak++;
            currentDate = entryDate;
          } else {
            break;
          }
        }

        return { streak: Math.max(1, streak), freeze: freezeUsed };
      }

      async getAllEntryDates() {
        if (this.isDemo) {
          return Object.keys(DEMO_DATA.entries);
        }

        if (!this.supabaseClient) return [];

        try {
          const result = await this._withRetry(async () => await this.supabaseClient
            .from('daily_entries')
            .select('entry_date')
            .eq('user_id', this.userId));

          return result.data ? result.data.map(d => d.entry_date) : [];
        } catch (e) {
          console.error('getAllEntryDates error:', e);
          return [];
        }
      }

        if (!this.supabaseClient) return null;
        try {
          const result = await this._withRetry(async () => await this.supabaseClient
            .from('weekly_reflections')
            .select('answers')
            .eq('user_id', this.userId)
            .eq('week_key', weekKey)

      async getAllReflectionWeeks() {
        if (this.isDemo) {
          return Object.keys(DEMO_DATA.weeklyReflections).sort().reverse();
        }
        if (!this.supabaseClient) return [];
        try {
          const result = await this._withRetry(async () => await this.supabaseClient
            .from('weekly_reflections')
            .select('week_key')
            .eq('user_id', this.userId)
            .order('week_key', { ascending: false }));
          return (result.data || []).map(r => r.week_key);

      async getEntryDatesForMonth(year, month) {

        if (this.isDemo) {

      async toggleHabit(habitId, date) {
        const key = `${date}_${habitId}`;

        if (this.isDemo) {
          if (!DEMO_DATA.habitTracks[key]) {
            DEMO_DATA.habitTracks[key] = true;
          } else {
            delete DEMO_DATA.habitTracks[key];
          }
          saveDemoData();
          return !DEMO_DATA.habitTracks[key];
        }

        if (!this.supabaseClient) return false;

        try {
          // Prüfe aktuellen Status in der DB (nicht in DEMO_DATA!)
          const exists = await this.getHabitStatus(habitId, date);
          if (exists) {
            await this._withRetry(async () => await this.supabaseClient
              .from('habit_logs')
              .delete()
              .eq('user_id', this.userId)
              .eq('habit_id', habitId)
              .eq('log_date', date));
          } else {
            await this._withRetry(async () => await this.supabaseClient
              .from('habit_logs')
              .insert({ user_id: this.userId, habit_id: habitId, log_date: date, completed: true }));

          return !exists;
        } catch (e) {
          console.error('toggleHabit error:', e);
          return false;
        }

      async getHabitStatus(habitId, date) {
        const key = `${date}_${habitId}`;
        if (this.isDemo) return !!DEMO_DATA.habitTracks[key];

        if (!this.supabaseClient) return false;
        try {
          const result = await this._withRetry(async () => await this.supabaseClient
            .from('habit_logs')
            .select('id')
            .eq('user_id', this.userId)
            .eq('habit_id', habitId)
            .eq('log_date', date)
            .maybeSingle());
          return !!result.data;
        } catch (e) {
          console.error('getHabitStatus error:', e);
          return false;
        }
      }

      // ---- Habits CRUD ----

      // Sortierreihenfolge aus localStorage laden/speichern
      _getHabitOrder() {
        try {
          const key = `habitOrder_${this.userId || 'demo'}`;
          const stored = localStorage.getItem(key);
          return stored ? JSON.parse(stored) : null;
        } catch { return null; }
      }
      _saveHabitOrder(orderedIds) {
        try {
          const key = `habitOrder_${this.userId || 'demo'}`;
          localStorage.setItem(key, JSON.stringify(orderedIds));
        } catch {}
      }
      _applyHabitOrder(habits) {
        const order = this._getHabitOrder();
        if (!order || order.length === 0) return habits;
        const map = {};
        habits.forEach(h => { map[h.id] = h; });
        const ordered = [];
        // Erst die gespeicherten IDs in Reihenfolge
        order.forEach(id => { if (map[id]) { ordered.push(map[id]); delete map[id]; } });
        // Dann neue Habits die noch nicht in der Sortierung sind
        Object.values(map).forEach(h => ordered.push(h));
        return ordered;
      }

      reorderHabit(habits, habitId, direction) {
        const idx = habits.findIndex(h => h.id === habitId);
        if (idx < 0) return habits;
        const newIdx = direction === 'up' ? idx - 1 : idx + 1;
        if (newIdx < 0 || newIdx >= habits.length) return habits;
        const copy = [...habits];
        [copy[idx], copy[newIdx]] = [copy[newIdx], copy[idx]];
        this._saveHabitOrder(copy.map(h => h.id));
        return copy;
      }

      async getHabits() {
        if (this.isDemo) {
          return this._applyHabitOrder(DEMO_DATA.habits || []);
        }
        if (!this.supabaseClient || !this.userId) return [];
        try {
          const result = await this._withRetry(async () =>
            await this.supabaseClient.from('habits').select('*').eq('user_id', this.userId).order('created_at', { ascending: true }));
          const habits = result.data || [];

          // Lade Track-Daten der letzten 28 Tage für die 4-Wochen-Grafik
          if (habits.length > 0) {
            const since = new Date();
            since.setDate(since.getDate() - 28);
            const sinceStr = since.toISOString().split('T')[0];
            try {
              const tracksResult = await this._withRetry(async () =>
                await this.supabaseClient.from('habit_logs').select('habit_id, log_date')
                  .eq('user_id', this.userId)
                  .gte('log_date', sinceStr)
                  .eq('completed', true));
              const tracks = tracksResult.data || [];
              // Cache-Objekt pro Habit: { 'YYYY-MM-DD': true }
              habits.forEach(h => { h._trackCache = {}; });
              const habitMap = {};
              habits.forEach(h => { habitMap[h.id] = h; });
              tracks.forEach(t => {
                if (habitMap[t.habit_id]) {
                  habitMap[t.habit_id]._trackCache[t.log_date] = true;
                }
              });
            } catch (e) {
              console.error('getHabitTracks error:', e);
            }
          }

          return this._applyHabitOrder(habits);
        } catch (e) {
          console.error('getHabits error:', e);
          return [];
        }
      }

      async addHabit(name) {
        console.log('[Habits] addHabit called with:', name, '| isDemo:', this.isDemo, '| userId:', this.userId);
        if (!name || !name.trim()) { console.warn('[Habits] Empty name'); return { error: 'Leerer Name' }; }
        const trimmed = name.trim().slice(0, 100);

        if (this.isDemo) {
          const newId = Date.now();
          if (!DEMO_DATA.habits) DEMO_DATA.habits = [];
          DEMO_DATA.habits.push({ id: newId, name: trimmed, createdAt: Date.now() });
          saveDemoData();
          console.log('[Habits] Demo habit saved:', trimmed, '| Total:', DEMO_DATA.habits.length);
          return { data: { id: newId, name: trimmed } };
        }

        if (!this.supabaseClient) { console.error('[Habits] No supabaseClient!'); return { error: 'Kein Supabase-Client' }; }
        if (!this.userId) { console.error('[Habits] No userId!'); return { error: 'Nicht angemeldet (kein userId)' }; }
        try {
          // month_date = erster Tag des aktuellen Monats (NOT NULL in DB)
          const now = new Date();
          const monthDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
          const result = await this._withRetry(async () =>
            await this.supabaseClient.from('habits').insert({ user_id: this.userId, name: trimmed, month_date: monthDate }).select().single());
          console.log('[Habits] Supabase result:', JSON.stringify(result));
          if (result.error) {
            console.error('[Habits] Supabase error:', result.error.message, result.error.details);
            return { error: 'DB: ' + result.error.message };
          }
          return { data: result.data };
        } catch (e) {
          console.error('[Habits] addHabit exception:', e);
          return { error: 'Exception: ' + (e.message || 'Unbekannt') };
        }
      }

      async deleteHabit(habitId) {
        if (this.isDemo) {
          DEMO_DATA.habits = DEMO_DATA.habits.filter(h => h.id !== habitId);
          // Zugehörige Tracks löschen
          Object.keys(DEMO_DATA.habitTracks).forEach(key => {

        try {

          await this._withRetry(async () =>
            await this.supabaseClient.from('habit_logs').delete().eq('habit_id', habitId).eq('user_id', this.userId));
          const result = await this._withRetry(async () =>

          return !result.error;
        } catch (e) {

          return false;
        }
      }

      getTodayDate() {
        // Vor 4 Uhr nachts zählt als "gestern" (Abend-Eintrag vom Vortag)
        const now = new Date();
        if (now.getHours() < 4) {
          now.setDate(now.getDate() - 1);
        }
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }

      isMorningTime() {
        const hour = new Date().getHours();
        // 4-13 Uhr = Morgen, 14-3 Uhr = Abend
        return hour >= 4 && hour < 14;
      }

      const id = Date.now();

      const timeout = setTimeout(() => {
        toastQueue = toastQueue.filter(t => t.id !== id);
        toastTimeouts.delete(id);

      toastTimeouts.set(id, timeout);

                          app.setState({ habits: reordered });
                        }}>▲</button>
                      <button style="background:none;border:none;color:${idx === habits.length - 1 ? 'var(--border)' : 'var(--text-secondary)'};cursor:${idx === habits.length - 1 ? 'default' : 'pointer'};font-size:11px;padding:0;line-height:1"
                        onclick=${() => {
                          if (idx === habits.length - 1) return;
                          const reordered = dataService.reorderHabit(habits, habit.id, 'down');
                          app.setState({ habits: reordered });

                  ${habitsEditMode ? html`
                    <button style="background:none;border:none;color:#DC2626;cursor:pointer;font-size:14px;padding:4px 8px;flex-shrink:0" onclick=${async () => {
                      if (!confirm('Gewohnheit „' + habit.name + '" wirklich löschen?')) return;
                      try {
                        await dataService.deleteHabit(habit.id);
                        const updatedHabits = await dataService.getHabits();
                        app.setState({ habits: updatedHabits });

                            e.target.value = '';

                          } else {
                            showToast('Fehler: ' + (result?.error || 'Unbekannt'), 'error');
                          }
                        } catch (err) {

                          showToast('Fehler: ' + (err.message || 'Unbekannt'), 'error');
                        }

                <button class="btn btn-primary btn-small" style="min-width:40px" onclick=${async (e) => {
                  const input = e.target.closest('div')?.querySelector('input');

    function getISOWeek(date) {
      const d = new Date(date);
      d.setHours(0,0,0,0);
      d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
      const week1 = new Date(d.getFullYear(), 0, 4);
      return d.getFullYear() + '-W' + String(1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7)).padStart(2, '0');
    }

    // Journal-State (Module-Scope, damit sie beim Re-Render erhalten bleiben)
    let journalCurrentQuestion = 0;
    let journalAnswers = {};

    function JournalScreen({ dataService, onClose, type, backfillDate }) {
      // Wenn wir im Edit-Modus sind, lade vorhandene Antworten
      if (window._editContent && journalCurrentQuestion === 0 && Object.keys(journalAnswers).length === 0) {
        const ec = window._editContent;
        const questions = JOURNAL_QUESTIONS[type];
        if (questions) {
          questions.forEach(q => {
            if (ec[q.key]) journalAnswers[q.key] = ec[q.key];
          });
        }
        window._editContent = null;
      }

      let currentQuestion = journalCurrentQuestion;
      let answers = journalAnswers;
      const questions = JOURNAL_QUESTIONS[type];

      const handleNext = async () => {
        if (currentQuestion < questions.length - 1) {
          journalCurrentQuestion++;
          app.render();
        } else {
          await saveAndClose();
        }
      };

      const handleSkip = () => {
        if (currentQuestion < questions.length - 1) {
          journalCurrentQuestion++;
          app.render();
        } else {
          onClose();
        }
      };

      const saveAndClose = async () => {
        try {
          console.log('[Journal] Saving:', type, JSON.stringify(journalAnswers));
          const success = await dataService.saveEntry(backfillDate || null, type, journalAnswers);
          console.log('[Journal] Save result:', success);
          if (success) {
            showToast('Eintrag gespeichert ✓', 'success');
            triggerConfetti();
            setTimeout(() => onClose(), 1500);
          } else {
            showToast('Speichern fehlgeschlagen. Bitte prüfe deine Verbindung und versuche es erneut.', 'error');
          }
        } catch (err) {
          console.error('[Journal] Save error:', err);
          showToast('Fehler beim Speichern: ' + (err.message || 'Unbekannter Fehler'), 'error');
        }
      };

      const question = questions[currentQuestion];

      return html`
        <div class="screen journal-screen active">
          <div class="journal-header">
            <div class="journal-title">${type === 'morning' ? '🌅 Morgens' : '🌙 Abends'}${backfillDate ? html` <span style="font-size:14px;color:var(--text-secondary);font-weight:400">— ${backfillDate}</span>` : ''}</div>
            <div class="journal-close" onclick=${() => {
              const hasContent = Object.values(journalAnswers).some(v =>
                Array.isArray(v) ? v.some(i => i && i.trim()) : (v && v.trim()));
              if (hasContent && !confirm('Eintrag wirklich schließen? Nicht gespeicherte Änderungen gehen verloren.')) return;
              onClose();
            }}>✕</div>
          </div>

          <div class="journal-progress">
            ${questions.map((_, idx) => html`
              <div class=${'progress-bar ' + (idx <= currentQuestion ? 'active' : '')}></div>
            `)}
          </div>

          <div class="question-section">
            <div class="question-label">${question.label}</div>
            <div class="question-inputs">
              ${Array(question.count).fill().map((_, idx) => html`
                <textarea
                  key=${question.key + '-' + idx}
                  class="input-field"
                  placeholder=${`Antwort ${idx + 1}`}
                  rows=${2}
                  maxlength=${500}
                  value=${question.count > 1 ? (journalAnswers[question.key]?.[idx] || '') : (journalAnswers[question.key] || '')}
                  oninput=${e => {
                    if (question.count > 1) {
                      if (!journalAnswers[question.key]) journalAnswers[question.key] = [];
                      journalAnswers[question.key][idx] = e.target.value;
                    } else {
                      journalAnswers[question.key] = e.target.value;
                    }
                  }}
                  onkeydown=${e => {
                    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                      e.preventDefault();
                      handleNext();
                    }
                  }}
                  onblur=${async e => {
                    // Auto-Save bei Fokus-Verlust
                    if (e.target.value.trim()) {
                      try {
                        const saved = await dataService.saveEntry(backfillDate || null, type, journalAnswers);
                        if (!saved) showToast('Auto-Speichern fehlgeschlagen', 'error');
                      } catch (err) {
                        showToast('Speichern fehlgeschlagen — Eingaben bleiben lokal erhalten', 'error');
                      }
                    }
                  }}
                ></textarea>
              `)}
            </div>
          </div>

          <div class="journal-footer">
            <button class="btn skip-btn btn-small" onclick=${handleSkip}>Überspringen</button>
            <button class="btn btn-primary btn-small" onclick=${handleNext}>
              ${currentQuestion === questions.length - 1 ? '✓ Fertig' : '→ Weiter'}
            </button>
          </div>
        </div>
      `;
    }

    // ============================================================================
    // COMPONENT: Archive/Calendar
    // ============================================================================

    // Globaler State für Challenge-Overlay
    let showChallengeOverlay = false;
    let challengeRating = 0;
    let challengeNote = '';
    let challengeReflectionLoaded = null; // { rating, note } wenn geladen

    // Globaler State für Kalender-Monat (persistiert zwischen Re-Renders)
    let archiveViewMonth = new Date();
    let archiveSelectedDate = null;
    let archiveSelectedEntry = null;
    let archiveSelectedPhoto = null; // Foto für Lightbox-Overlay
    let archiveMonthEntryDates = []; // Dates mit Einträgen im aktuellen Monat
    let archiveMonthLoaded = ''; // "YYYY-MM" des geladenen Monats

    // XSS-Schutz: HTML-Entities escapen bevor User-Content gerendert wird
    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    function formatEntryContent(content) {
      if (!content || typeof content !== 'object') return [];
      const parts = [];
      if (content.grateful) parts.push({ label: 'Dankbar für', items: content.grateful.filter(Boolean) });
      if (content.wonderful) parts.push({ label: 'Wunderbar wäre', items: content.wonderful.filter(Boolean) });
      if (content.affirmation) parts.push({ label: 'Heute will ich sein', items: [content.affirmation] });
      if (content.great_things) parts.push({ label: 'Tolle Dinge', items: content.great_things.filter(Boolean) });
      if (content.good_deed) parts.push({ label: 'Gutes getan für', items: [content.good_deed] });
      if (content.learned) parts.push({ label: 'Gelernt', items: [content.learned] });
      if (content.improve) parts.push({ label: 'Besser machen', items: [content.improve] });
      return parts;
    }

    function ArchiveScreen({ dataService, todayEntry }) {
      const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
      const getFirstDayOfMonth = (date) => {
        let d = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
        return d === 0 ? 7 : d; // Montag = 1
      };
      const monthNames = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
      const weekDays = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];

      // Lade Eintrags-Daten für aktuellen Monat (Demo + Cloud)
      const monthKey = `${archiveViewMonth.getFullYear()}-${String(archiveViewMonth.getMonth()+1).padStart(2,'0')}`;
      if (archiveMonthLoaded !== monthKey) {
        archiveMonthLoaded = monthKey;
        dataService.getEntryDatesForMonth(archiveViewMonth.getFullYear(), archiveViewMonth.getMonth()).then(dates => {
          archiveMonthEntryDates = dates;
          app.render();
        });
      }

      const firstDay = getFirstDayOfMonth(archiveViewMonth);
      const daysInMonth = getDaysInMonth(archiveViewMonth);
      const daysInPrevMonth = getDaysInMonth(new Date(archiveViewMonth.getFullYear(), archiveViewMonth.getMonth() - 1));

      const calendarDays = [];
      for (let i = firstDay - 1; i >= 1; i--) {
        calendarDays.push({ day: daysInPrevMonth - i + 1, isOtherMonth: true });
      }
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${archiveViewMonth.getFullYear()}-${String(archiveViewMonth.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const hasEntry = archiveMonthEntryDates.includes(dateStr);
        calendarDays.push({ day, isOtherMonth: false, dateStr, hasEntry });
      }
      const remainingDays = 42 - calendarDays.length;
      for (let day = 1; day <= remainingDays; day++) {
        calendarDays.push({ day, isOtherMonth: true });
      }

      const today = new Date();
      const isCurrentMonth = archiveViewMonth.getMonth() === today.getMonth() && archiveViewMonth.getFullYear() === today.getFullYear();

      let _archiveRequestId = 0;
      const handleDayClick = async (dateStr) => {
        if (!dateStr) return;
        archiveSelectedDate = dateStr;
        archiveSelectedEntry = null;
        archiveSelectedPhoto = null;
        app.render(); // Sofort UI updaten (loading state)
        const requestId = ++_archiveRequestId;
        const entry = await dataService.getEntries(dateStr);
        if (requestId !== _archiveRequestId) return; // Veralteter Request → ignorieren
        archiveSelectedEntry = entry;
        // Lade auch das Foto für diesen Tag
        const photo = await dataService.getDailyPhoto(dateStr);
        if (requestId !== _archiveRequestId) return;
        archiveSelectedPhoto = photo;
        app.render();
      };

      // Formatiere Eintrag hübsch
      const renderEntry = (entry, type) => {
        if (!entry) return '';
        const parts = formatEntryContent(entry);
        if (!parts.length) return html`<div class="entry-text" style="color:var(--text-secondary);font-style:italic">Keine Details</div>`;
        return parts.map(p => html`
          <div style="margin-bottom:8px">
            <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px">${escapeHtml(p.label)}</div>
            ${p.items.map(item => html`<div style="font-size:14px;color:var(--text-secondary);padding:2px 0">• ${escapeHtml(item)}</div>`)}
          </div>
        `);
      };

      return html`
        <div class="screen archive-screen active">
          <div class="calendar-header">
            <div class="calendar-month">${monthNames[archiveViewMonth.getMonth()]} ${archiveViewMonth.getFullYear()}</div>
            <div class="calendar-nav">
              <button onclick=${() => {
                archiveViewMonth = new Date(archiveViewMonth.getFullYear(), archiveViewMonth.getMonth() - 1);
                archiveSelectedDate = null;
                archiveSelectedEntry = null;
                app.render();
              }}>←</button>
              <button onclick=${() => {
                archiveViewMonth = new Date(archiveViewMonth.getFullYear(), archiveViewMonth.getMonth() + 1);
                archiveSelectedDate = null;
                archiveSelectedEntry = null;
                app.render();
              }}>→</button>
            </div>
          </div>

          <div class="weekdays">
            ${weekDays.map(day => html`<div class="weekday">${day}</div>`)}
          </div>

          <div class="calendar-grid">
            ${calendarDays.map(({ day, isOtherMonth, dateStr, hasEntry }) => html`
              <div
                class=${'calendar-day' + (isOtherMonth ? ' other-month' : '') + (isCurrentMonth && day === today.getDate() && !isOtherMonth ? ' today' : '') + (hasEntry ? ' has-entry' : '') + (dateStr === archiveSelectedDate ? ' selected' : '')}
                onclick=${() => !isOtherMonth && handleDayClick(dateStr)}
                style=${dateStr === archiveSelectedDate ? 'background:var(--accent-light);color:var(--bg);font-weight:700' : ''}
              >
                ${day}
              </div>
            `)}
          </div>

          ${archiveSelectedDate && !archiveSelectedEntry && _archiveRequestId > 0 ? html`
            <div class="entry-detail" style="text-align:center;padding:20px">
              <div style="color:var(--text-secondary);font-size:14px">Lade Eintrag…</div>
            </div>
          ` : ''}

          ${archiveSelectedEntry && (archiveSelectedEntry.morning || archiveSelectedEntry.evening) ? html`
            <div class="entry-detail">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <div style="font-size:13px;font-weight:600;color:var(--text)">${archiveSelectedDate}</div>
              </div>
              ${archiveSelectedPhoto ? html`
                <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;padding:12px;background:var(--bg-alt);border-radius:12px">
                  <img src=${archiveSelectedPhoto} style="width:80px;height:80px;object-fit:cover;border-radius:10px;cursor:pointer;flex-shrink:0" onclick=${() => {
                    app.render();
                  }} alt="Photo from ${archiveSelectedDate}" />
                  <div style="flex:1;min-width:0">
                    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">📸 Bild des Tages</div>
                    <div style="font-size:13px;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical">${
                      archiveSelectedEntry.morning?.grateful?.[0]
                        ? 'Dankbar für: ' + archiveSelectedEntry.morning.grateful[0]
                        : archiveSelectedEntry.evening?.great_things?.[0]
                          ? archiveSelectedEntry.evening.great_things[0]
                          : 'Tippe für Vollbild'
                    }</div>
                  </div>
                </div>
              ` : ''}
              ${archiveSelectedEntry.morning ? html`
                <div style="display:flex;justify-content:space-between;align-items:center">
                  <div class="entry-section-title">🌅 Morgens</div>
                  <button style="background:none;border:none;color:var(--accent-light);cursor:pointer;font-size:12px;padding:4px" onclick=${() => {
                    window._backfillDate = archiveSelectedDate;
                    window._editContent = archiveSelectedEntry.morning;
                    if (window._appNavigate) window._appNavigate('journal', 'morning');
                  }}>✎ Bearbeiten</button>
                </div>
                ${renderEntry(archiveSelectedEntry.morning, 'morning')}
              ` : html`
                <button class="btn btn-small" style="width:100%;margin-bottom:12px;background:var(--bg-alt);color:var(--text);border:1px dashed var(--border);border-radius:12px;padding:12px;font-size:13px;cursor:pointer" onclick=${() => {
                  window._backfillDate = archiveSelectedDate;
                  if (window._appNavigate) window._appNavigate('journal', 'morning');
                }}>🌅 Morgens nachtragen</button>
              `}
              ${archiveSelectedEntry.evening ? html`
                <div style="display:flex;justify-content:space-between;align-items:center">
                  <div class="entry-section-title">🌙 Abends</div>
                  <button style="background:none;border:none;color:var(--accent-light);cursor:pointer;font-size:12px;padding:4px" onclick=${() => {
                    window._backfillDate = archiveSelectedDate;
                    window._editContent = archiveSelectedEntry.evening;
                    if (window._appNavigate) window._appNavigate('journal', 'evening');
                  }}>✎ Bearbeiten</button>
                </div>
                ${renderEntry(archiveSelectedEntry.evening, 'evening')}
              ` : html`
                <button class="btn btn-small" style="width:100%;margin-top:8px;background:var(--bg-alt);color:var(--text);border:1px dashed var(--border);border-radius:12px;padding:12px;font-size:13px;cursor:pointer" onclick=${() => {
                  window._backfillDate = archiveSelectedDate;
                  if (window._appNavigate) window._appNavigate('journal', 'evening');
                }}>🌙 Abends nachtragen</button>
              `}
            </div>
          ` : ''}

          ${archiveSelectedDate && (!archiveSelectedEntry || (!archiveSelectedEntry.morning && !archiveSelectedEntry.evening)) && new Date(archiveSelectedDate) <= new Date() ? html`
            <div class="entry-detail" style="text-align:center">
              <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">${archiveSelectedDate}</div>
              <div style="font-size:14px;color:var(--text-secondary);margin-bottom:16px">Kein Eintrag für diesen Tag</div>
              <button class="btn btn-primary btn-small" onclick=${() => {
                window._backfillDate = archiveSelectedDate;
                if (window._appNavigate) window._appNavigate('journal', 'morning');
              }}>
                📝 Eintrag nachtragen
              </button>
            </div>
          ` : ''}

          ${archiveSelectedPhoto ? html`
            <div class="photo-lightbox" onclick=${e => { if (e.target === e.currentTarget) { archiveSelectedPhoto = null; app.render(); } }}>
              <button class="photo-lightbox-close" onclick=${() => { archiveSelectedPhoto = null; app.render(); }}>×</button>
              <img src=${archiveSelectedPhoto} class="photo-lightbox-image" alt="Photo fullscreen" />
            </div>
          ` : ''}
        </div>
      `;
    }

    // ============================================================================
    // COMPONENT: Weekly Reflection
    // ============================================================================

    let reflectionAnswers = {};
    let reflectionWeek = getISOWeek(new Date());
    let reflectionSaved = false;
    let reflectionLoading = false;
    let reflectionLoaded = false; // flag to prevent re-loading on every render
    let reflectionArchiveWeeks = []; // list of all saved weeks

    // Navigate to a different week
    function navigateReflectionWeek(dataService, direction) {
      const currentWeek = reflectionWeek;
      const [yearStr, weekStr] = currentWeek.split('-W');
      let year = parseInt(yearStr);
      let week = parseInt(weekStr) + direction;
      if (week < 1) { year--; week = 52; }
      if (week > 52) { year++; week = 1; }
      const newWeek = year + '-W' + String(week).padStart(2, '0');
      // Don't navigate beyond current week
      if (newWeek > getISOWeek(new Date())) return;
      reflectionWeek = newWeek;
      reflectionAnswers = {};
      reflectionSaved = false;
      reflectionLoaded = false;
      app.render();
    }

    function WeeklyReflectionScreen({ dataService }) {
      const currentISOWeek = getISOWeek(new Date());
      const isCurrentWeek = reflectionWeek === currentISOWeek;
      const isPastWeek = reflectionWeek < currentISOWeek;

      // Async load existing answers (once per week change)
      if (!reflectionLoaded && !reflectionLoading) {
        reflectionLoading = true;
        (async () => {
          try {
            const existing = await dataService.getReflection(reflectionWeek);
            if (existing && reflectionWeek === reflectionWeek) {
              reflectionAnswers = { ...existing };
              reflectionSaved = isPastWeek; // mark past weeks as already saved
            }
            // Also load archive list
            reflectionArchiveWeeks = await dataService.getAllReflectionWeeks();
          } catch (e) {
            console.error('Load reflection error:', e);
          }
          reflectionLoading = false;
          reflectionLoaded = true;
          app.render();
        })();
      }

      const handleSave = async () => {
        const success = await dataService.saveReflection(reflectionWeek, reflectionAnswers);
        if (success) {
          reflectionSaved = true;
          // Update archive list
          if (!reflectionArchiveWeeks.includes(reflectionWeek)) {
            reflectionArchiveWeeks.unshift(reflectionWeek);
            reflectionArchiveWeeks.sort().reverse();
          }
          showToast('Wochenreflexion gespeichert ✓', 'success');
          triggerConfetti();
        } else {
          showToast('Speichern fehlgeschlagen', 'error');
        }
        app.render();
      };

      const weekLabel = reflectionWeek.replace('-W', ', Woche ');
      const hasContent = Object.values(reflectionAnswers).some(v => v !== '' && v !== undefined && v !== null);

      return html`
        <div class="screen reflection-screen active">
          <div class="reflection-header">
            <div class="reflection-title">📝 Wochenreflexion</div>
            <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:4px">
              <button onclick=${() => navigateReflectionWeek(dataService, -1)}
                style="background:none;border:none;color:var(--accent-light);font-size:22px;cursor:pointer;padding:4px 8px"
                title="Vorherige Woche">◀</button>
              <div class="reflection-week" style="min-width:150px;text-align:center">
                ${weekLabel}${isCurrentWeek ? ' (aktuell)' : ''}
              </div>
              <button onclick=${() => navigateReflectionWeek(dataService, 1)}
                style="background:none;border:none;color:${isCurrentWeek ? 'var(--text-secondary)' : 'var(--accent-light)'};font-size:22px;cursor:pointer;padding:4px 8px;opacity:${isCurrentWeek ? '0.3' : '1'}"
                disabled=${isCurrentWeek}
                title="Nächste Woche">▶</button>
            </div>
          </div>

          ${reflectionLoading ? html`
            <div style="text-align:center;padding:40px;color:var(--text-secondary)">
              <div style="font-size:24px;margin-bottom:8px">⏳</div>
              Lade Reflexion…
            </div>
          ` : html`
            ${WEEKLY_QUESTIONS.map(q => html`
              <div class="reflection-question" key=${q.key}>
                <div class="reflection-label">${q.label}</div>
                ${q.type === 'rating' ? html`
                  <div class="reflection-rating">
                    ${Array(10).fill().map((_, i) => html`
                      <button
                        class=${'rating-btn' + (reflectionAnswers[q.key] === (i+1) ? ' selected' : '')}
                        onclick=${() => { reflectionAnswers[q.key] = i + 1; app.render(); }}
                      >${i + 1}</button>
                    `)}
                  </div>
                ` : html`
                  <textarea
                    class="input-field"
                    rows="3"
                    maxlength="500"
                    placeholder="Deine Antwort..."
                    value=${reflectionAnswers[q.key] || ''}
                    oninput=${e => { reflectionAnswers[q.key] = e.target.value; }}
                    style="-webkit-user-select:text;user-select:text;min-height:60px"
                  ></textarea>
                `}
              </div>
            `)}

            <button class="btn btn-primary" onclick=${handleSave} style="margin-top:8px"
              disabled=${!hasContent}>
              ✓ Reflexion speichern
            </button>

            ${reflectionSaved ? html`
              <div style="text-align:center;padding:16px;color:var(--success);font-weight:600">
                Gespeichert für ${weekLabel}
              </div>
            ` : ''}

            ${reflectionArchiveWeeks.length > 1 ? html`
              <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:16px">
                <div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">📚 Bisherige Reflexionen</div>
                <div style="display:flex;flex-wrap:wrap;gap:6px">
                  ${reflectionArchiveWeeks.map(wk => html`
                    <button
                      onclick=${() => {
                        if (wk !== reflectionWeek) {
                          reflectionWeek = wk;
                          reflectionAnswers = {};
                          reflectionSaved = false;
                          reflectionLoaded = false;
                          app.render();
                        }
                      }}
                      style="padding:4px 10px;border-radius:12px;border:1px solid ${wk === reflectionWeek ? 'var(--accent-light)' : 'var(--border)'};background:${wk === reflectionWeek ? 'var(--accent-light)' : 'transparent'};color:${wk === reflectionWeek ? 'var(--bg)' : 'var(--text-secondary)'};font-size:12px;cursor:pointer"
                    >${wk.replace('-W', '/W')}</button>
                  `)}
                </div>
              </div>
            ` : ''}
          `}
        </div>
      `;
    }

    // ============================================================================
    // COMPONENT: Feedback Modal
    // ============================================================================

    // GAS Web-App URL — ersetze nach Deployment des Google Apps Scripts
    const FEEDBACK_GAS_URL = 'https://script.google.com/macros/s/AKfycbzxxww_fnXptKOsBiky_PSHYXVgHsbVUIzmpwimj-a4lz05lcGcSI_wVkAA9R4asZM7/exec';

    let feedbackOpen = false;
    let feedbackCategory = 'Verbesserung';
    let feedbackRating = 0;
    let feedbackMessage = '';
    let feedbackSubmitting = false;
    let feedbackLastSubmit = 0;

    function FeedbackModal({ onClose }) {
      const categories = ['Fehler', 'Verbesserung', 'Lob', 'Frage', 'Sonstiges'];

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (Date.now() - feedbackLastSubmit < 10000) {
          showToast('Bitte 10 Sekunden warten', 'info');
          return;
        }
        if (!feedbackMessage.trim()) {
          showToast('Bitte eine Nachricht eingeben', 'error');
          return;
        }
        feedbackSubmitting = true;
        app.render();

        try {
          const payload = {
            name: 'App-User',
            category: feedbackCategory,
            rating: feedbackRating,
            message: feedbackMessage.substring(0, 2000),
            page: window.location.pathname,
            platform: (navigator.platform || 'unknown').substring(0, 30)
          };

          if (FEEDBACK_GAS_URL) {
            await fetch(FEEDBACK_GAS_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify(payload)
            });
          } else {
            console.log('[Feedback] Kein GAS-Endpoint konfiguriert');
          }

          feedbackLastSubmit = Date.now();
          showToast('Danke für dein Feedback! 🙏', 'success');
          feedbackCategory = 'Verbesserung';
          feedbackRating = 0;
          feedbackMessage = '';
          feedbackOpen = false;
          onClose();
        } catch (err) {
          showToast('Fehler beim Senden. Versuche es später erneut.', 'error');
        } finally {
          feedbackSubmitting = false;
          app.render();
        }
      };

      return html`
        <div class="feedback-overlay" onclick=${(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div class="feedback-modal">
            <div class="feedback-header">💬 Feedback geben</div>
            <form onsubmit=${handleSubmit}>
              <div class="feedback-form-group">
                <div class="feedback-label">Kategorie</div>
                <div class="feedback-categories">
                  ${categories.map(cat => html`
                    <button type="button"
                      class=${'feedback-cat-btn' + (feedbackCategory === cat ? ' active' : '')}
                      onclick=${() => { feedbackCategory = cat; app.render(); }}>
                      ${cat}
                    </button>
                  `)}
                </div>
              </div>

              <div class="feedback-form-group">
                <div class="feedback-label">Bewertung (optional)</div>
                <div class="feedback-stars">
                  ${[1,2,3,4,5].map(star => html`
                    <span class=${'feedback-star' + (feedbackRating >= star ? ' active' : '')}
                      onclick=${() => { feedbackRating = star; app.render(); }}>⭐</span>
                  `)}
                </div>
              </div>

              <div class="feedback-form-group">
                <div class="feedback-label">Nachricht *</div>
                <textarea class="feedback-textarea"
                  placeholder="Was läuft gut? Was könnte besser sein?"
                  maxlength=${2000}
                  oninput=${e => { feedbackMessage = e.target.value; app.render(); }}
                >${feedbackMessage}</textarea>
                <div class="feedback-counter">${feedbackMessage.length} / 2000</div>
              </div>

              <div class="feedback-actions">
                <button type="button" class="btn btn-secondary btn-small" onclick=${onClose}
                  disabled=${feedbackSubmitting}>Abbrechen</button>
                <button type="submit" class="btn btn-primary btn-small"
                  disabled=${feedbackSubmitting}>
                  ${feedbackSubmitting ? '⏳ Sende...' : '📤 Absenden'}
                </button>
              </div>

              ${!FEEDBACK_GAS_URL ? html`
                <div style="margin-top:12px;padding:8px 12px;background:var(--bg-alt);color:var(--accent-light);border-radius:8px;font-size:12px;border:1px solid var(--border)">
                  ⚠️ Feedback-Endpoint noch nicht konfiguriert. Feedback wird in die Console geloggt.
                </div>
              ` : ''}
            </form>
          </div>
        </div>
      `;
    }
