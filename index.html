    // ============================================================================
    // MAIN APP COMPONENT
    // ============================================================================

    class App extends Component {
      constructor(props) {
        super(props);
        this.state = {
          screen: 'auth',         // 'auth' | 'onboarding' | 'dashboard' | 'journal' | 'archive' | 'settings'
          dataService: null,       // DataService instance
          authChecking: true,      // true while checking existing session
          todayEntry: null,
          streak: 0,
          habits: [],
          journalType: null,
          backfillDate: null,
          showOnboarding: false,
          todayPhoto: null         // Base64 Photo des Tages
        };
        this.unsubAuth = null;
      }

      async componentDidMount() {
        window._appNavigate = this.handleNavigate;
        // Bridge: app.setState() für module-scope Komponenten (DashboardScreen etc.)
        app.setState = (state) => this.setState(state);
        // iOS ITP Recovery: Falls localStorage gelöscht wurde, aus IndexedDB wiederherstellen
        await recoverDemoDataFromIDB();
        // Auto-connect Supabase wenn Credentials hardcoded sind
        if (supabaseUrl && supabaseKey) {
          try {
            const ds = await DataService.createWithSupabase(supabaseUrl.trim(), supabaseKey.trim());
            if (ds) {
              // Prüfe ob bereits eine Session existiert
              const { data: { session } } = await ds.supabaseClient.auth.getSession();
              if (session?.user) {
                // Bestehende Session — direkt in die App
                ds.user = session.user;
                ds.userId = session.user.id;
                this.setupAuthListener(ds);
                await this.enterApp(ds);
                return;
              }
              // Keine Session — Auth-Screen zeigen für Google Login oder Demo-Modus
              this.setupAuthListener(ds);
              console.log('[Auto-Connect] Keine Session, zeige Auth-Screen');
              this.setState({ screen: 'auth', dataService: ds, authChecking: false });
              return;
            }
          } catch (e) {
            console.warn('[Auto-Connect] Supabase-Verbindung fehlgeschlagen, fallback auf Demo-Modus', e);
          }
        }
        // Fallback: Demo-Modus
        await this.handleDemoMode();
      }

      componentWillUnmount() {
        if (this.unsubAuth) this.unsubAuth();
      }

      setupAuthListener(ds) {
        if (this.unsubAuth) this.unsubAuth();
        this.unsubAuth = ds.onAuthStateChange(async (event, session) => {
          console.log('[Auth]', event);
          if (event === 'SIGNED_IN' && session?.user) {
            await this.enterApp(ds);
          } else if (event === 'SIGNED_OUT') {
            this.setState({ screen: 'auth', dataService: ds, authChecking: false });
          }
        });
      }

      async enterApp(ds) {
        const entry = await ds.getEntries();
        const streakData = await ds.getStreak();
        const habits = await ds.getHabits();
        // Challenge-Reflexion vorladen
        try {
          const ch = getCurrentWeekChallenge();
          const year = new Date().getFullYear();
          const existing = await ds.getChallengeReflection(ch.weekNum, year);
          if (existing) {
            challengeRating = existing.rating || 0;
            challengeNote = existing.note || '';
            challengeReflectionLoaded = existing;
          }
        } catch (_) {}
        // Onboarding nur beim allerersten App-Start zeigen
        const isFirstTime = !localStorage.getItem('6min_onboarding_done');
        this.setState({
          screen: 'dashboard',
          dataService: ds,
          authChecking: false,
          todayEntry: entry,
          streak: streakData.streak,
          habits,
          showOnboarding: isFirstTime
        });
      }

      // Called from AuthScreen
      handleLogin = async (type, dsOrNull) => {
        if (type === 'supabase-init') {
          // User just connected Supabase — setup listener
          const ds = dsOrNull;
          this.setupAuthListener(ds);
          this.setState({ dataService: ds });
          showToast('Supabase verbunden! Jetzt anmelden.', 'success');
          return;
        }
      };

      handleDemoMode = async () => {
        const ds = new DataService(true);
        ds.userId = 'demo_user';
        await this.enterApp(ds);
      };

      handleNavigate = async (screen, extra = null) => {
        const { dataService } = this.state;

        // State-Cleanup: bei jedem Screenwechsel alte States zurücksetzen
        if (this.state.screen === 'journal' && screen !== 'journal') {
          journalCurrentQuestion = 0;
          journalAnswers = {};
          window._editContent = null;
        }
        freezeConfirmOpen = false;
        habitsEditMode = false;
        newHabitName = '';

        if (screen === 'dashboard') {
          const entry = await dataService.getEntries();
          const streakData = await dataService.getStreak();
          const habits = await dataService.getHabits();
          const photo = await dataService.getDailyPhoto();
          this.setState({
            screen,
            todayEntry: entry,
            streak: streakData.streak,
            habits,
            todayPhoto: photo,
            journalType: null,
            backfillDate: null
          });
        } else if (screen === 'journal') {
          journalCurrentQuestion = 0;
          journalAnswers = {};
          const backfillDate = window._backfillDate || null;
          window._backfillDate = null;
          this.setState({ screen, journalType: extra, backfillDate });
        } else if (screen === 'archive') {
          const entry = await dataService.getEntries();
          this.setState({ screen, todayEntry: entry });
        } else if (screen === 'reflection') {
          reflectionAnswers = {};
          reflectionSaved = false;
          reflectionLoaded = false;
          reflectionLoading = false;
          reflectionWeek = getISOWeek(new Date());
          this.setState({ screen });
        } else if (screen === 'supabase-setup') {
          authMode = 'config';
          this.setState({ screen: 'auth' });
        } else {
          this.setState({ screen });
        }
      };

      handleJournalClose = async () => {
        // State-Cleanup: Journal-Antworten und Frage-Index zurücksetzen
        journalCurrentQuestion = 0;
        journalAnswers = {};
        window._editContent = null;

        const { dataService } = this.state;
        const entry = await dataService.getEntries();
        const streakData = await dataService.getStreak();
        const photo = await dataService.getDailyPhoto();
        this.setState({
          screen: 'dashboard',
          todayEntry: entry,
          streak: streakData.streak,
          todayPhoto: photo,
          journalType: null,
          backfillDate: null
        });
      };

      handleLogout = async () => {
        const { dataService } = this.state;
        if (dataService && !dataService.isDemo) {
          await dataService.signOut();
        }
        authEmail = '';
        authPassword = '';
        authError = '';
        this.setState({
          screen: 'auth',
          todayEntry: null,
          streak: 0,
          journalType: null,
          showOnboarding: false
        });
      };

      handleOnboardingComplete = () => {
        localStorage.setItem('6min_onboarding_done', '1');
        this.setState({ showOnboarding: false });
      };

      render() {
        const {
          screen, dataService, authChecking, todayEntry, streak,
          journalType, backfillDate, showOnboarding, todayPhoto
        } = this.state;

        // Loading state while checking session
        if (authChecking) {
          return html`
            <div id="app">
              <div class="auth-loading">📔 Lade...</div>
              <${Toast} />
            </div>
          `;
        }

        // Auth screen
        if (screen === 'auth') {
          return html`
            <div id="app">
              <${AuthScreen}
                onLogin=${this.handleLogin}
                onDemoMode=${this.handleDemoMode}
                dataService=${dataService}
              />
              <${Toast} />
            </div>
          `;
        }

        // Onboarding
        if (showOnboarding) {
          return html`
            <div id="app">
              <${OnboardingScreen} onComplete=${this.handleOnboardingComplete} />
              <${Toast} />
            </div>
          `;
        }

        // Main app
        return html`
          <div id="app">
            <div class="screen-container">
              <div class="screen-content">
                ${screen === 'dashboard' ? html`
                  <${DashboardScreen}
                    dataService=${dataService}
                    onNavigate=${this.handleNavigate}
                    todayEntry=${todayEntry}
                    streak=${streak}
                    habits=${this.state.habits || []}
                    todayPhoto=${todayPhoto}
                  />
                ` : ''}
                ${screen === 'journal' ? html`
                  <${JournalScreen}
                    dataService=${dataService}
                    onClose=${this.handleJournalClose}
                    type=${journalType}
                    backfillDate=${backfillDate}
                  />
                ` : ''}
                ${screen === 'archive' ? html`
                  <${ArchiveScreen}
                    dataService=${dataService}
                    todayEntry=${todayEntry}
                  />
                ` : ''}
                ${screen === 'reflection' ? html`
                  <${WeeklyReflectionScreen}
                    dataService=${dataService}
                  />
                ` : ''}
                ${screen === 'settings' ? html`
                  <${SettingsScreen}
                    dataService=${dataService}
                    onNavigate=${this.handleNavigate}
                    onLogout=${this.handleLogout}
                  />
                ` : ''}
              </div>
            </div>

            <div class="tab-bar">
              <button class=${'tab ' + (screen === 'dashboard' ? 'active' : '')} onclick=${() => this.handleNavigate('dashboard')}>
                <div>🏠</div>
                <div class="tab-label">Home</div>
              </button>
              <button class=${'tab ' + (screen === 'archive' ? 'active' : '')} onclick=${() => this.handleNavigate('archive')}>
                <div>📅</div>
                <div class="tab-label">Archiv</div>
              </button>
              <button class=${'tab ' + (screen === 'reflection' ? 'active' : '')} onclick=${() => this.handleNavigate('reflection')}>
                <div>📝</div>
                <div class="tab-label">Reflexion</div>
              </button>
              <button class=${'tab ' + (screen === 'settings' ? 'active' : '')} onclick=${() => this.handleNavigate('settings')}>
                <div>⚙️</div>
                <div class="tab-label">Settings</div>
              </button>
            </div>

            ${!feedbackOpen ? html`
              <button onclick=${() => { feedbackOpen = true; feedbackCategory = 'Verbesserung'; feedbackRating = 0; feedbackMessage = ''; app.render(); }}
                style="position:fixed;bottom:${screen === 'journal' ? '20px' : '80px'};right:16px;z-index:90;width:48px;height:48px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center"
                title="Feedback geben">💬</button>
            ` : ''}
            ${feedbackOpen ? html`<${FeedbackModal} onClose=${() => { feedbackOpen = false; app.render(); }} />` : ''}
            <${Toast} />
          </div>
        `;
      }
    }

    // ============================================================================
    // CONFETTI EFFECT
    // ============================================================================

    function triggerConfetti() {
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * window.innerWidth + 'px';
        confetti.style.backgroundColor = ['#E8B86D', '#1A1A2E', '#16a34a'][Math.floor(Math.random() * 3)];
        confetti.style.opacity = Math.random();
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 3000);
      }
    }

    // ============================================================================
    // MOUNT APP
    // ============================================================================

    const app = {
      render() {
        render(h(App), document.getElementById('app'));
      }
    };

    // Service Worker registrieren (PWA) — nur über HTTPS oder localhost
    if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => {
          console.log('[App] SW registered:', reg.scope);

          // Smart Update-Check: bei Tab-Fokus + alle 30 Minuten
          let swFailures = 0;
          const smartSWUpdate = () => {
            if (document.hidden) return;
            reg.update().then(() => { swFailures = 0; })
              .catch(() => { swFailures++; });
          };
          document.addEventListener('visibilitychange', () => { if (!document.hidden) smartSWUpdate(); });
          setInterval(smartSWUpdate, 1800000); // Alle 30 Min

          // Reload nach Controller-Wechsel — NICHT während Journal-Eingabe
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            // Nicht reloaden wenn User gerade im Journal tippt
            const isInJournal = !!document.querySelector('.journal-screen');
            if (isInJournal) {
              console.log('[App] SW updated, but user is in journal — deferring reload');
              const banner = document.createElement('div');
              banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#E8B86D;color:#1A1A2E;padding:10px 16px;text-align:center;font-size:13px;font-weight:600';
              banner.textContent = 'Update bereit — wird nach dem Speichern geladen';
              document.body.prepend(banner);
              return;
            }
            refreshing = true;
            location.reload();
          });

          // Update-Banner wenn neue Version bereit (kein Auto-Reload)
          let updateBannerShown = false;
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            if (!newSW) return;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller && !updateBannerShown) {
                updateBannerShown = true;
                // Update-Banner via DOM-API (kein innerHTML)
                const banner = document.createElement('div');
                banner.id = 'sw-update-banner';
                banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:var(--accent-light,#E8B86D);color:#1A1A2E;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.2)';
                const label = document.createElement('span');
                label.textContent = 'Neue Version verfügbar!';
                const btn = document.createElement('button');
                btn.textContent = 'Jetzt laden';
                btn.style.cssText = 'background:#1A1A2E;color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600';
                btn.addEventListener('click', () => {
                  newSW.postMessage({ type: 'SKIP_WAITING' });
                  // Reload passiert automatisch via controllerchange-Event
                });
                banner.appendChild(label);
                banner.appendChild(btn);
                document.body.prepend(banner);
              }
            });
          });
        })
        .catch(err => console.warn('[App] SW registration failed:', err));
    }

    app.render();
  </script>
